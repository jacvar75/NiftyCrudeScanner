<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crude Buyer Engine v7.0</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Variables ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #121829;
            --bg-tertiary: #1a1f3a;
            --bg-light: #242d4a;

            --accent-primary: #00d9ff;
            --accent-secondary: #6c5ce7;
            --accent-tertiary: #a29bfe;

            --success: #00ff88;
            --warning: #ffa502;
            --danger: #ff4757;
            --gold: #ffd700;

            --text-primary: #f0f4f8;
            --text-secondary: #a0aec0;
            --text-muted: #718096;

            --border: rgba(255, 255, 255, 0.05);
            --border-light: rgba(255, 255, 255, 0.08);

            --mono: 'JetBrains Mono', monospace;
            --sans: 'Poppins', sans-serif;

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: var(--sans);
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f1432 50%, var(--bg-primary) 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 14, 39, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 28px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 217, 255, 0.05);
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            box-shadow: 0 0 12px var(--accent-primary), 0 0 24px rgba(0, 217, 255, 0.4);
            animation: pulse-glow 2.5s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 12px var(--accent-primary), 0 0 24px rgba(0, 217, 255, 0.4); }
            50% { box-shadow: 0 0 20px var(--accent-primary), 0 0 40px rgba(0, 217, 255, 0.6); }
        }

        .logo-text {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .tier-badge {
            font-family: var(--mono);
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 6px;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            letter-spacing: 0.06em;
            font-weight: 600;
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.15);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: blink-pulse 1.4s ease-in-out infinite;
            box-shadow: 0 0 8px var(--success);
        }

        @keyframes blink-pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--success); }
            50% { opacity: 0.4; box-shadow: 0 0 4px var(--success); }
        }

        .page {
            max-width: 1500px;
            margin: 0 auto;
            padding: 24px 28px 100px;
        }

        .signal-hero {
            border-radius: 16px;
            border: 1px solid var(--border-light);
            padding: 28px;
            margin-bottom: 24px;
            background: rgba(18, 24, 41, 0.6);
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .signal-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(0, 217, 255, 0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .signal-hero.call {
            border-color: rgba(0, 255, 136, 0.3);
            background: rgba(0, 255, 136, 0.02);
        }

        .signal-hero.put {
            border-color: rgba(255, 71, 87, 0.3);
            background: rgba(255, 71, 87, 0.02);
        }

        .signal-hero.exit {
            border-color: rgba(255, 207, 0, 0.4);
            background: rgba(255, 207, 0, 0.03);
            animation: exit-pulse 1.2s ease-in-out infinite;
        }

        @keyframes exit-pulse {
            0%, 100% { box-shadow: var(--shadow-md), 0 0 0 0 rgba(255, 207, 0, 0.2); }
            50% { box-shadow: var(--shadow-md), 0 0 30px 8px rgba(255, 207, 0, 0.1); }
        }

        .signal-label {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 700;
        }

        .signal-decision {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 8px;
        }

        .signal-decision.call { color: var(--success); text-shadow: 0 0 20px rgba(0, 255, 136, 0.3); }
        .signal-decision.put { color: var(--danger); text-shadow: 0 0 20px rgba(255, 71, 87, 0.3); }
        .signal-decision.none { color: var(--text-secondary); }
        .signal-decision.exit { color: var(--gold); text-shadow: 0 0 20px rgba(255, 207, 0, 0.3); }

        .signal-reason {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .signal-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }

        .meta-item {
            background: rgba(26, 31, 58, 0.4);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            backdrop-filter: blur(8px);
            transition: all 0.3s ease;
        }

        .meta-item:hover {
            border-color: rgba(0, 217, 255, 0.3);
            background: rgba(0, 217, 255, 0.05);
        }

        .meta-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .meta-value {
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .grid2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 960px) { .grid2 { grid-template-columns: 1fr; } }

        .card {
            background: rgba(18, 24, 41, 0.6);
            border: 1px solid var(--border-light);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--border);
            background: rgba(18, 24, 41, 0.8);
        }

        .card-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .quality-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .quality-num {
            font-family: var(--mono);
            font-size: 36px;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .quality-denom {
            font-size: 16px;
            color: var(--text-muted);
        }

        .quality-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .bar-track {
            height: 8px;
            background: rgba(26, 31, 58, 0.8);
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
            border: 1px solid var(--border-light);
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 12px rgba(0, 217, 255, 0.3);
        }

        .quality-tiers {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }

        .quality-tier {
            font-size: 11px;
            color: var(--text-muted);
            font-family: var(--mono);
            font-weight: 500;
        }

        .tag-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tag {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            font-family: var(--sans);
            font-weight: 500;
            border: 1px solid;
            transition: all 0.3s ease;
        }

        .tag.kill {
            background: rgba(255, 71, 87, 0.1);
            color: #ff6b7a;
            border-color: rgba(255, 71, 87, 0.3);
        }

        .tag.kill:hover {
            background: rgba(255, 71, 87, 0.15);
            border-color: rgba(255, 71, 87, 0.5);
        }

        .tag.warn {
            background: rgba(255, 165, 2, 0.1);
            color: #ffb84d;
            border-color: rgba(255, 165, 2, 0.3);
        }

        .tag.warn:hover {
            background: rgba(255, 165, 2, 0.15);
            border-color: rgba(255, 165, 2, 0.5);
        }

        .tag.clear {
            background: rgba(0, 255, 136, 0.1);
            color: #4dffaa;
            border-color: rgba(0, 255, 136, 0.3);
        }

        .tag.clear:hover {
            background: rgba(0, 255, 136, 0.15);
            border-color: rgba(0, 255, 136, 0.5);
        }

        .tag-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: 0 0 6px currentColor;
        }

        .trade-card {
            background: rgba(18, 24, 41, 0.6);
            border: 1px solid rgba(0, 217, 255, 0.25);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0, 217, 255, 0.08);
            transition: all 0.3s ease;
        }

        .trade-card:hover {
            border-color: rgba(0, 217, 255, 0.4);
            box-shadow: 0 12px 32px rgba(0, 217, 255, 0.12);
        }

        .trade-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .trade-symbol {
            font-family: var(--mono);
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .trade-type-badge {
            font-family: var(--mono);
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 700;
            border: 1px solid;
            transition: all 0.3s ease;
        }

        .trade-type-badge.call {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
            border-color: rgba(0, 255, 136, 0.4);
        }

        .trade-type-badge.put {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
            border-color: rgba(255, 71, 87, 0.4);
        }

        .trade-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        @media (max-width: 600px) { .trade-grid { grid-template-columns: repeat(2, 1fr); } }

        .trade-stat {
            background: rgba(26, 31, 58, 0.4);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .trade-stat:hover {
            border-color: var(--border);
            background: rgba(26, 31, 58, 0.6);
        }

        .trade-stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .trade-stat-value {
            font-family: var(--mono);
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .force-exit-btn {
            background: rgba(255, 71, 87, 0.15);
            border: 1.5px solid var(--danger);
            color: var(--danger);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 12px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            font-size: 14px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.1);
        }

        .force-exit-btn:hover {
            background: rgba(255, 71, 87, 0.25);
            border-color: #ff8a99;
            color: #ff8a99;
            box-shadow: 0 8px 20px rgba(255, 71, 87, 0.2);
            transform: translateY(-2px);
        }

        .force-exit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            pointer-events: none;
        }

        .exit-alert {
            background: rgba(255, 207, 0, 0.08);
            border: 1.5px solid rgba(255, 207, 0, 0.4);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 12px 32px rgba(255, 207, 0, 0.1);
            animation: alert-scale 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes alert-scale {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .exit-alert-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
            letter-spacing: -0.01em;
        }

        .exit-alert-body {
            font-size: 15px;
            color: rgba(255, 207, 0, 0.8);
            line-height: 1.6;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 14, 39, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.3);
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-scan {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .connecting {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 120px 0;
            gap: 20px;
            color: var(--text-secondary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-light);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .topbar { padding: 0 16px; }
            .page { padding: 16px 12px 100px; }
            .signal-hero { padding: 20px; }
            .card { padding: 16px; }
            .signal-decision { font-size: 32px; }
            .grid2 { gap: 16px; }
            .signal-meta { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
        }

        @media (max-width: 480px) {
            .topbar { height: 56px; padding: 0 12px; }
            .logo-text { font-size: 11px; }
            .tier-badge { font-size: 10px; padding: 4px 10px; }
            .signal-decision { font-size: 28px; }
            .quality-num { font-size: 28px; }
            .trade-grid { grid-template-columns: 1fr; }
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-light);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
        }

        .status-pill .label {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-pill .value {
            font-family: var(--mono);
            font-weight: 700;
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <div class="logo-dot"></div>
        <div class="logo-text">Crude Buyer v7.0</div>
    </div>
    <div class="topbar-right">
        <div class="tier-badge" id="data-tier">TIER 1 : LIVE</div>
        <div class="status-pill">
            <span class="label">DTE</span>
            <span class="value" id="dteVal">—</span>
        </div>
        <div class="status-pill">
            <span class="label">Expiry</span>
            <span class="value" id="expiryDateVal">—</span>
        </div>
        <div class="live-indicator">
            <div class="live-dot"></div>
            <span>Connected</span>
        </div>
    </div>
</div>

<div class="page">
    <div id="main-content">
        <div class="connecting">
            <div class="spinner"></div>
            <span>Connecting to engine...</span>
        </div>
    </div>
    <div id="force-exit-container" style="display: none; margin-top: 10px;">
        <button class="force-exit-btn" id="forceExitBtn">⛔ Force Exit</button>
    </div>
</div>

<div class="footer">
    <div class="footer-left">
        <span>🛢️ MCX Crude Oil Options</span>
        <span style="color: rgba(255, 255, 255, 0.2)">·</span>
        <span>Auto-scan via 60s polling</span>
    </div>
    <div class="footer-right">
        Last scan: <span class="footer-scan" id="last-scan-footer">--:--:--</span>
    </div>
</div>

<script>
const socket = io('http://localhost:8064');

// ─── Sound Alert ──────────────────────────────────────────────
function playAlert() {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
    } catch(e) {}
}

// ─── Force Exit Button ──────────────────────────────────────
const forceExitBtn = document.getElementById('forceExitBtn');
if (forceExitBtn) {
    forceExitBtn.addEventListener('click', function() {
        if (confirm('⛔ Are you sure you want to force exit the current crude trade?')) {
            socket.emit('force_exit');
            this.textContent = '⏳ Exiting...';
            this.disabled = true;
        }
    });
}

// ─── Persistent state ──────────────────────────────────────
let tradeActive = false;
let entryDecision = '';
let entryPrice = 0;
let entryTime = null;
let timerInterval = null;
let qty = 100;
let currentLivePrice = 0;
let currentTrailStop = null;
let currentSymbol = '';
let tradeData = {
    strike: null,
    option_sl: null,
    option_tp: null,
    max_loss: null,
    setup_quality: 0,
    failed_criteria: [],
    kills: [],
    last_scan: null
};

// ─── Timer update ──────────────────────────────────────────
function updateTimer() {
    if (!entryTime) return;
    const elapsed = (Date.now() - entryTime) / 60000;
    const el = document.getElementById('timerDisplay');
    if (el) {
        if (elapsed < 60) el.textContent = Math.round(elapsed) + 'm';
        else {
            const h = Math.floor(elapsed / 60);
            const m = Math.round(elapsed % 60);
            el.textContent = h + 'h ' + m + 'm';
        }
    }
}

// ─── Core render function ──
function renderScoreBreakdown(sb) {
    const rows = Object.entries(sb.features).map(([name, f]) => {
        return `<div class="tag warn"><div class="tag-dot"></div>${name}: ${f.score} (${f.reason})</div>`;
    }).join('');
    return `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.1);width:100%">
                <div class="tag warn" style="font-weight:600"><div class="tag-dot"></div>Score ${sb.total} / ${sb.threshold}</div>
                ${rows}
            </div>`;
}

function renderDashboard(data, isMonitoring = false) {
    const sig = data.decision || 'NO TRADE';
    const isExit = sig.includes('EXIT');
    const isCall = sig.includes('CALL');
    const isPut = sig.includes('PUT');

    let displayDecision = sig;
    let displayEntry = data.entry_ltp || data.option_ltp || 0;
    let liveLtp = data.option_ltp || 0;
    let bidPrice = data.bid_price || 0;
    let trailStopDisplay = data.trail_stop || null;

    if (tradeActive) {
        displayDecision = entryDecision || sig;
        displayEntry = entryPrice;
        liveLtp = currentLivePrice > 0 ? currentLivePrice : displayEntry;
        trailStopDisplay = currentTrailStop;
        if (isMonitoring) {
            if (data.strike) tradeData.strike = data.strike;
            if (data.option_sl) tradeData.option_sl = data.option_sl;
            if (data.option_tp) tradeData.option_tp = data.option_tp;
            if (data.max_loss) tradeData.max_loss = data.max_loss;
            if (data.setup_quality) tradeData.setup_quality = data.setup_quality;
            if (data.failed_criteria) tradeData.failed_criteria = data.failed_criteria;
            if (data.kills) tradeData.kills = data.kills;
        }
    } else {
        tradeData.strike = data.strike || null;
        tradeData.option_sl = data.option_sl || null;
        tradeData.option_tp = data.option_tp || null;
        tradeData.max_loss = data.max_loss || null;
        tradeData.setup_quality = data.setup_quality || 0;
        tradeData.failed_criteria = data.failed_criteria || [];
        tradeData.kills = data.kills || [];
    }

    if (data.last_scan) {
        tradeData.last_scan = data.last_scan;
        document.getElementById('last-scan-footer').textContent = tradeData.last_scan;
    }

    const cls = isExit ? 'exit' : isCall ? 'call' : isPut ? 'put' : 'none';
    const signalCls = isCall ? 'call' : isPut ? 'put' : cls;

    const lotSize = qty;
    const pnl = (liveLtp - displayEntry) * lotSize;
    const trailDisplay = (trailStopDisplay !== null && trailStopDisplay > 0) ? '₹' + trailStopDisplay.toFixed(2) : '--';

    let html = '';

    // ─── Hero Signal ────────────────────────────────────────
    html += `
    <div class="signal-hero ${signalCls}">
        <div class="signal-label">Signal Status</div>
        <div class="signal-decision ${signalCls}">${displayDecision}</div>
        <div class="signal-reason">${data.reason || data.primary_reason || ''}</div>
        <div class="signal-meta">
            ${tradeData.strike ? `<div class="meta-item"><div class="meta-label">Strike</div><div class="meta-value">₹${tradeData.strike}</div></div>` : ''}
            ${displayEntry ? `<div class="meta-item"><div class="meta-label">Entry LTP</div><div class="meta-value">₹${displayEntry.toFixed(2)}</div></div>` : ''}
            ${tradeData.option_sl ? `<div class="meta-item"><div class="meta-label">Stop Loss</div><div class="meta-value" style="color:var(--danger)">₹${tradeData.option_sl}</div></div>` : ''}
            <div class="meta-item"><div class="meta-label">Take Profit</div><div class="meta-value" style="color:var(--success)">Trailing Only</div></div>
            ${(tradeActive) ? `
            <div class="meta-item">
                <div class="meta-label">P&L</div>
                <div class="meta-value" style="color:${pnl >= 0 ? 'var(--success)' : 'var(--danger)'}">
                    ₹${pnl.toFixed(2)}
                </div>
            </div>` : ''}
            ${data.lots ? `
            <div class="meta-item">
                <div class="meta-label">Lots</div>
                <div class="meta-value">${data.lots}</div>
            </div>` : ''}
            ${data.breakeven_locked ? `
            <div class="meta-item">
                <div class="meta-label">Breakeven</div>
                <div class="meta-value" style="color:var(--gold);">✅ Locked</div>
            </div>` : ''}
            ${data.effective_sl ? `
            <div class="meta-item">
                <div class="meta-label">Effective SL</div>
                <div class="meta-value" style="color:var(--danger);">₹${Number(data.effective_sl).toFixed(2)}</div>
            </div>` : ''}
            <div class="meta-item">
                <div class="meta-label">⏱ Elapsed</div>
                <div class="meta-value" id="timerDisplay">${data.time_elapsed !== undefined ? Math.round(data.time_elapsed) + 'm' : '0m'}</div>
            </div>
        </div>
    </div>`;

    // ─── Exit alert ──────────────────────────────────────────
    if (isExit) {
        html += `<div class="exit-alert"><div class="exit-alert-title">⚠️ Action Required</div><div class="exit-alert-body">${data.reason || ''}</div></div>`;
        document.getElementById('main-content').innerHTML = html;
        tradeActive = false;
        entryDecision = '';
        entryPrice = 0;
        entryTime = null;
        currentLivePrice = 0;
        currentTrailStop = null;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        const forceContainer = document.getElementById('force-exit-container');
        if (forceContainer) forceContainer.style.display = 'none';
        return;
    }

    // ─── Trade Card ──────────────────────────────────────────
    if (tradeActive || isCall || isPut || isMonitoring) {
        const symbol = currentSymbol || data.json?.order?.tradingsymbol || (data.strike ? data.strike + (sig.includes('CALL') ? 'CE' : 'PE') : 'N/A');
        const isBullish = displayDecision.includes('CALL');
        const tradeCls = isBullish ? 'call' : 'put';

        html += `
        <div class="trade-card">
            <div class="trade-header">
                <div class="trade-symbol">${symbol}</div>
                <div class="trade-type-badge ${tradeCls}">${isBullish ? '📈 CALL BUY' : '📉 PUT BUY'}${tradeActive ? ' — ACTIVE' : ''}</div>
            </div>
            <div class="trade-grid">
                <div class="trade-stat"><div class="trade-stat-label">Live Price (LTP)</div><div class="trade-stat-value" style="color:${liveLtp > displayEntry ? 'var(--success)' : 'var(--danger)'}">₹${liveLtp.toFixed(2)}</div></div>
                <div class="trade-stat"><div class="trade-stat-label">Bid Price</div><div class="trade-stat-value" style="color:${bidPrice > 0 ? 'var(--accent-primary)' : 'var(--text-muted)'}">${bidPrice > 0 ? '₹' + bidPrice.toFixed(2) : '--'}</div></div>
                <div class="trade-stat"><div class="trade-stat-label">Max Loss</div><div class="trade-stat-value" style="color:var(--danger)">₹${tradeData.max_loss || '--'}</div></div>
                <div class="trade-stat"><div class="trade-stat-label">Trail Stop</div><div class="trade-stat-value" style="color:var(--warning)">${trailDisplay}</div></div>
            </div>
        </div>`;
    }

    // ─── Quality + Kills grid ──────────────────────────────
    html += `<div class="grid2">`;
    const q = tradeData.setup_quality || 0;
    let qualityLabel = 'Weak';
    if (q >= 80) qualityLabel = 'Strong';
    else if (q >= 57) qualityLabel = 'Acceptable';

    html += `
    <div class="card">
        <div class="card-title">📊 Setup Quality</div>
        <div class="quality-row">
            <div><span class="quality-num">${q}</span><span class="quality-denom">/100</span></div>
            <div class="quality-label">${qualityLabel}</div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${q}%"></div></div>
        <div class="quality-tiers">
            <span class="quality-tier">Weak</span>
            <span class="quality-tier">Acceptable</span>
            <span class="quality-tier">Strong</span>
        </div>
    </div>`;

    const kills = tradeData.kills || [];
    const failed = tradeData.failed_criteria || [];
    html += `<div class="card"><div class="card-title">🛡️ Risk Management</div><div class="tag-list">`;
    if (kills.length) {
        kills.forEach(k => html += `<div class="tag kill"><div class="tag-dot"></div>${k}</div>`);
    } else if (tradeActive) {
        html += `<div class="tag clear"><div class="tag-dot"></div>All systems clear ✓</div>`;
    } else {
        html += `<div class="tag warn"><div class="tag-dot"></div>${data.reason || 'Awaiting trade signal'}</div>`;
    }
    failed.forEach(f => html += `<div class="tag warn"><div class="tag-dot"></div>${f}</div>`);
    if (data.score_breakdown) {
        html += renderScoreBreakdown(data.score_breakdown);
    }
    html += `</div></div>`;
    html += `</div>`;

    document.getElementById('main-content').innerHTML = html;

    const forceContainer = document.getElementById('force-exit-container');
    if (forceContainer) {
        if (tradeActive) {
            forceContainer.style.display = 'block';
            const btn = document.getElementById('forceExitBtn');
            if (btn) {
                btn.style.display = 'block';
                btn.textContent = '⛔ Force Exit';
                btn.disabled = false;
            }
        } else {
            forceContainer.style.display = 'none';
        }
    }
}

// ─── Socket events ──────────────────────────────────────
socket.on('connect', () => {
    socket.emit('request_signal');
});

socket.on('crude_orderflow_signal', function(data) {
    const sig = data.decision || '';
    const isExit = sig.includes('EXIT');

    // --- NEW: DTE/Expiry update ---
    const dteVal = document.getElementById('dteVal');
    const expiryDateVal = document.getElementById('expiryDateVal');
    if (dteVal) dteVal.textContent = data.dte ?? '—';
    if (expiryDateVal) expiryDateVal.textContent = data.expiry_date || '—';

    if (isExit) {
        renderDashboard(data);
        return;
    }

    if (data.is_monitoring) {
        tradeActive = true;
        if (data.decision) entryDecision = data.decision;
        if (data.entry_ltp) entryPrice = data.entry_ltp;
        if (data.lots) qty = data.lots * 100;
        if (data.option_ltp && data.option_ltp > 0) currentLivePrice = data.option_ltp;
        if (data.trail_stop && data.trail_stop > 0) currentTrailStop = data.trail_stop;
        if (data.strike) tradeData.strike = data.strike;
        if (data.option_sl) tradeData.option_sl = data.option_sl;
        if (data.option_tp) tradeData.option_tp = data.option_tp;
        if (data.max_loss) tradeData.max_loss = data.max_loss;
        if (data.setup_quality) tradeData.setup_quality = data.setup_quality;
        if (data.failed_criteria) tradeData.failed_criteria = data.failed_criteria;
        if (data.kills) tradeData.kills = data.kills;
        if (data.json?.order?.tradingsymbol) currentSymbol = data.json.order.tradingsymbol;

        if (data.time_elapsed !== undefined && data.time_elapsed > 0) {
            entryTime = Date.now() - (data.time_elapsed * 60000);
        } else if (!entryTime) {
            entryTime = Date.now();
        }
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateTimer, 1000);

        renderDashboard(data, true);

        const forceContainer = document.getElementById('force-exit-container');
        if (forceContainer) forceContainer.style.display = 'block';
        const monitorBtn = document.getElementById('forceExitBtn');
        if (monitorBtn) {
            monitorBtn.style.display = 'block';
            monitorBtn.textContent = '⛔ Force Exit';
            monitorBtn.disabled = false;
        }
        return;
    }

    const isFreshBuy = (sig.includes('CALL') || sig.includes('PUT')) && !data.is_monitoring;
    if (isFreshBuy && !tradeActive) {
        tradeActive = true;
        entryDecision = sig;
        entryPrice = data.entry_ltp || data.option_ltp || 0;
        if (data.lots) qty = data.lots * 100;
        currentLivePrice = data.option_ltp || entryPrice;
        currentTrailStop = null;
        if (data.strike) tradeData.strike = data.strike;
        if (data.option_sl) tradeData.option_sl = data.option_sl;
        if (data.option_tp) tradeData.option_tp = data.option_tp;
        if (data.max_loss) tradeData.max_loss = data.max_loss;
        if (data.setup_quality) tradeData.setup_quality = data.setup_quality;
        if (data.failed_criteria) tradeData.failed_criteria = data.failed_criteria;
        if (data.kills) tradeData.kills = data.kills;
        if (data.json?.order?.tradingsymbol) currentSymbol = data.json.order.tradingsymbol;
        entryTime = Date.now();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateTimer, 1000);
        renderDashboard(data);
        playAlert();
        const forceContainer = document.getElementById('force-exit-container');
        if (forceContainer) forceContainer.style.display = 'block';
        const buyBtn = document.getElementById('forceExitBtn');
        if (buyBtn) {
            buyBtn.style.display = 'block';
            buyBtn.textContent = '⛔ Force Exit';
            buyBtn.disabled = false;
        }
        return;
    }

    if (!tradeActive) {
        renderDashboard(data);
        const forceContainer = document.getElementById('force-exit-container');
        if (forceContainer) forceContainer.style.display = 'none';
        const idleBtn = document.getElementById('forceExitBtn');
        if (idleBtn) idleBtn.style.display = 'none';
    } else {
        if (data.last_scan) {
            tradeData.last_scan = data.last_scan;
            document.getElementById('last-scan-footer').textContent = data.last_scan;
        }
    }
});

setInterval(() => socket.emit('request_signal'), 30000);
</script>
</body>
</html>
